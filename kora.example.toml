[kora]
rate_limit = 100

[kora.auth]
api_key = ""
# Managed by `klave start` — reads KORA_API_KEY from .env

[kora.cache]
enabled = false
url = "redis://localhost:6379"
default_ttl = 300
account_ttl = 60

[validation]
price_source = "Jupiter"
max_allowed_lamports = 100000000
max_signatures = 10
allow_durable_transactions = false

allowed_programs = [
    "11111111111111111111111111111111",             # System Program
    "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA",  # SPL Token
    "TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb",  # Token-2022
    "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL", # Associated Token
    "AddressLookupTab1e1111111111111111111111111",  # Address Lookup Table
    "ComputeBudget111111111111111111111111111111",  # Compute Budget
    "MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr",  # Memo
    "whirLbMiicVdio4qvUfM5KAg6Ct8VwpYzGff3uctyCc",  # Orca Whirlpool
    "9W959DqEETiGZocYWCQPaS2U113wGZpT2NMC9Esh1xM6", # Orca Token Swap
    "GCU8h2yUZKPKemrxGu4tZoiiiUdhWeSonaWCgYbZaRBx", # Klave Vault
]

allowed_tokens = [
    "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v", # USDC 
    "So11111111111111111111111111111111111111112",  # WSOL 
]

allowed_spl_paid_tokens = [
    "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v", # USDC 
]

disallowed_accounts = []

[validation.price]
type = "free"

[validation.fee_payer_policy.system]
allow_transfer = false
allow_assign = false
allow_create_account = false
allow_allocate = false

[validation.fee_payer_policy.system.nonce]
allow_initialize = false
allow_advance = false
allow_authorize = false
allow_withdraw = false

[validation.fee_payer_policy.spl_token]
allow_transfer = false
allow_burn = false
allow_close_account = false
allow_approve = false
allow_revoke = false
allow_set_authority = false
allow_mint_to = false
allow_initialize_mint = false
allow_initialize_account = false
allow_initialize_multisig = false
allow_freeze_account = false
allow_thaw_account = false

[validation.fee_payer_policy.token_2022]
allow_transfer = false
allow_burn = false
allow_close_account = false
allow_approve = false
allow_revoke = false
allow_set_authority = false
allow_mint_to = false
allow_initialize_mint = false
allow_initialize_account = false
allow_initialize_multisig = false
allow_freeze_account = false
allow_thaw_account = false

[validation.token_2022]
blocked_mint_extensions = ["transfer_hook", "pausable", "permanent_delegate"]
blocked_account_extensions = ["cpi_guard", "memo_transfer"]
